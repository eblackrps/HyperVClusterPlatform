name: HyperVClusterPlatform CI

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: PSScriptAnalyzer Lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -Repository PSGallery

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $paths = @(
            '.\HyperVClusterPlatform.psd1'
            '.\HyperVClusterPlatform.psm1'
            '.\Public'
            '.\Private'
            '.\DSC'
            '.\Scripts'
          )
          $results = foreach ($path in $paths) {
            Invoke-ScriptAnalyzer -Path $path -Recurse -Severity Error, Warning `
              -Settings .\PSScriptAnalyzerSettings.psd1
          }
          if ($results) {
            $results | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer found $($results.Count) issue(s)."
            exit 1
          }
          Write-Host 'PSScriptAnalyzer: no issues found.' -ForegroundColor Green

  test:
    name: Pester Unit Tests (${{ matrix.label }})
    runs-on: windows-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: PowerShell 7
            shell: pwsh
            artifact_suffix: pwsh
          - label: Windows PowerShell 5.1
            shell: powershell
            artifact_suffix: winps
    steps:
      - uses: actions/checkout@v6

      - name: Install Pester 5
        shell: ${{ matrix.shell }}
        run: Install-Module Pester -MinimumVersion 5.0 -Force -Scope CurrentUser -Repository PSGallery

      - name: Run Pester tests
        shell: ${{ matrix.shell }}
        run: |
          Import-Module Pester -MinimumVersion 5.0 -ErrorAction Stop
          $config = New-PesterConfiguration
          $config.Run.Path = '.\Tests'
          $config.Run.PassThru = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'TestResults-${{ matrix.artifact_suffix }}.xml'
          $config.TestResult.OutputFormat = 'NUnitXml'
          $config.CodeCoverage.Enabled = $true
          $config.CodeCoverage.Path = @('.\Public', '.\Private')
          $config.CodeCoverage.OutputPath = 'coverage-${{ matrix.artifact_suffix }}.xml'
          $result = Invoke-Pester -Configuration $config
          if ($result.FailedCount -gt 0) {
            Write-Error "Pester: $($result.FailedCount) test(s) FAILED."
            exit 1
          }

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: ignore
          name: pester-results-${{ matrix.artifact_suffix }}
          path: |
            TestResults-${{ matrix.artifact_suffix }}.xml
            coverage-${{ matrix.artifact_suffix }}.xml

  smoke:
    name: Module Import Smoke (${{ matrix.label }})
    runs-on: windows-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: PowerShell 7
            shell: pwsh
          - label: Windows PowerShell 5.1
            shell: powershell
    steps:
      - uses: actions/checkout@v6

      - name: Verify module loads and exports correctly
        shell: ${{ matrix.shell }}
        run: |
          Import-Module .\HyperVClusterPlatform.psd1 -Force
          $cmds = Get-Command -Module HyperVClusterPlatform
          Write-Host "Engine: $($PSVersionTable.PSEdition) $($PSVersionTable.PSVersion)"
          Write-Host "Exported commands: $($cmds.Name -join ', ')"
          $required = @(
            'Invoke-HVClusterPlatform'
            'Invoke-HVClusterFleet'
            'Get-HVClusterHealth'
            'Invoke-HVHealthAlertPolicy'
            'Invoke-HVCertificationSuite'
          )
          $missing = $required | Where-Object { $_ -notin $cmds.Name }
          if ($missing) {
            Write-Error "Required exports missing: $($missing -join ', ')"
            exit 1
          }
          $version = (Get-Module HyperVClusterPlatform).Version
          Write-Host "Module version: $version" -ForegroundColor Green

      - name: Validate module manifest
        shell: ${{ matrix.shell }}
        run: |
          $result = Test-ModuleManifest -Path .\HyperVClusterPlatform.psd1
          Write-Host "Manifest valid: $($result.Name) v$($result.Version)"

  publish:
    name: Publish to PowerShell Gallery
    runs-on: windows-latest
    needs: smoke
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@v6

      - name: Publish module
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PSGALLERY_API_KEY)) {
            Write-Warning 'PSGALLERY_API_KEY is not configured; skipping PowerShell Gallery publish.'
            exit 0
          }

          $manifest = Import-PowerShellDataFile -Path .\HyperVClusterPlatform.psd1
          $expectedTag = "v$($manifest.ModuleVersion)"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Tag '$($env:GITHUB_REF_NAME)' does not match manifest ModuleVersion '$($manifest.ModuleVersion)'."
          }

          $packageRoot = Join-Path $env:RUNNER_TEMP 'HyperVClusterPlatform'
          if (Test-Path $packageRoot) {
            Remove-Item -LiteralPath $packageRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $packageRoot -Force | Out-Null
          Get-ChildItem -Force | Where-Object { $_.Name -notin @('.git', '.github') } |
            Copy-Item -Destination $packageRoot -Recurse -Force

          Publish-Module -Path $packageRoot -NuGetApiKey $env:PSGALLERY_API_KEY -Repository PSGallery
